name: Comparative Test Report

on:
  workflow_dispatch:  # Запуск только вручную для сравнения

jobs:
  test-ai-v1:
    name: Test AI Version 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ai-version-1 # Принудительно проверяем ветку v1
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore tests/Module.Tests/Lab.csproj
      - run: dotnet build tests/Module.Tests/Lab.csproj --no-restore
      - run: dotnet test tests/Module.Tests/Lab.csproj --no-build --verbosity normal

  test-ai-v2:
    name: Test AI Version 2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ai-version-2 # Принудительно проверяем ветку v2
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore tests/Module.Tests/Lab.csproj
      - run: dotnet build tests/Module.Tests/Lab.csproj --no-restore
      - run: dotnet test tests/Module.Tests/Lab.csproj --no-build --verbosity normal

  test-ai-v3:
    name: Test AI Version 3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ai-version-3 # Принудительно проверяем ветку v3
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore tests/Module.Tests/Lab.csproj
      - run: dotnet build tests/Module.Tests/Lab.csproj --no-restore
      - run: dotnet test tests/Module.Tests/Lab.csproj --no-build --verbosity normal
